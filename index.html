<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mentes Abundantes — M6 Tu Historia</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #FAF6F0; font-family: 'Nunito Sans', 'Segoe UI', sans-serif; }
    textarea, input { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const BRAND = {
      navy: "#152038",
      orange: "#D4762C",
      cream: "#F5E6C8",
      olive: "#8B9A5B",
      lightBg: "#FAF6F0",
      white: "#FFFFFF",
      darkText: "#2A2A2A",
      mutedText: "#6B7280",
    };

    const MEMBERS = [
      { id: "anahi", name: "Anahí", business: "EIA Wellness / Esthetics / Visuals" },
      { id: "wanda", name: "Wanda Bonilla", business: "Dielees Sweets & More" },
      { id: "arelis", name: "Arelis Rodríguez Ch", business: "Marca personal — Belleza, bienestar y salud visual" },
      { id: "liz", name: "Liz Jara", business: "Mentoría en Transformación Personal y Financiera — Alquimia" },
      { id: "misladys", name: "Misladys", business: "Espazioconproposito — Armonización energética" },
      { id: "mimi", name: "Mimi Marianella", business: "Mimistar — Construcción + Marketing de afiliados" },
      { id: "floredith", name: "Floredith", business: "Unique Cleaning Services LLC" },
      { id: "joanmirse", name: "Joanmirse Chacoa", business: "Bienestar y efectividad para madres emprendedoras" },
      { id: "ady", name: "Ady", business: "Servicios Financieros — Pólizas, 401k, will & trust" },
      { id: "luisandra", name: "Luisandra Rodríguez", business: "Comunidad de crecimiento personal y marketing digital" },
      { id: "desiree", name: "Desiree Castañeda", business: "Franquicia Personal Rent A House — Venezuela" },
      { id: "mayra", name: "Mayra", business: "En construcción" },
    ];

    const HISTORIAS = [
      {
        id: "origen",
        emoji: "🌱",
        titulo: "Historia de Origen",
        subtitulo: "Por qué empezaste",
        descripcion: "Esta historia construye conexión. Cuando la cuentas, la gente entiende de dónde vienes y por qué lo que haces es genuino.",
        color: BRAND.orange,
        preguntas: [
          "¿Cómo era tu vida o situación antes de empezar tu negocio? ¿Qué estabas viviendo?",
          "¿Qué momento concreto, situación o decisión te llevó a empezar? ¿Qué sentiste en ese instante?",
          "¿Qué decidiste o descubriste a partir de ese momento que cambió tu dirección?",
        ],
      },
      {
        id: "transformacion",
        emoji: "🦋",
        titulo: "Historia de Transformación",
        subtitulo: "Cómo cambiaste tú",
        descripcion: "Esta historia construye credibilidad. Muestra que tú misma viviste lo que ahora ayudas a otros a vivir.",
        color: BRAND.olive,
        preguntas: [
          "¿Qué creías antes sobre tu negocio, tu industria o ti misma que ya no crees hoy?",
          "¿Qué tuviste que soltar, aprender o enfrentar para llegar donde estás ahora?",
          "¿Cómo operas diferente hoy como resultado de esa transformación?",
        ],
      },
      {
        id: "cliente",
        emoji: "🤝",
        titulo: "Historia del Cliente",
        subtitulo: "A quién ayudas y cómo cambia su vida",
        descripcion: "Esta historia construye confianza. La persona que te lee se ve reflejada en tu cliente.",
        color: BRAND.navy,
        preguntas: [
          "Piensa en una persona a quien hayas ayudado (cliente, amiga, familiar). ¿Cómo llegó a ti? ¿Qué necesitaba o qué problema tenía?",
          "¿Qué trabajaron juntas o qué consejo o servicio le diste? Cuéntalo en lenguaje humano, sin tecnicismos.",
          "¿Cómo es su vida, negocio o situación hoy después de esa experiencia contigo? ¿Qué cambió?",
        ],
      },
    ];

    const SCREENS = { SELECT: "select", HOMEWORK: "homework", ADMIN: "admin" };

    // ─── Storage helpers ───────────────────────────────────────
    async function loadResponses(memberId) {
      try {
        const result = await window.storage.get(`m6:${memberId}`);
        if (!result || !result.value || result.value === "") return null;
        const parsed = JSON.parse(result.value);
        if (!parsed || Object.keys(parsed).length === 0) return null;
        return parsed;
      } catch { return null; }
    }

    async function saveResponses(memberId, data) {
      try {
        await window.storage.set(`m6:${memberId}`, JSON.stringify(data));
        return true;
      } catch { return false; }
    }

    async function loadAllResponses() {
      const all = {};
      for (const m of MEMBERS) {
        const r = await loadResponses(m.id);
        if (r) all[m.id] = r;
      }
      return all;
    }

    function emptyResponses() {
      const r = {};
      HISTORIAS.forEach(h => {
        h.preguntas.forEach((_, i) => { r[`${h.id}_q${i}`] = ""; });
        r[`${h.id}_reflexion`] = "";
      });
      return r;
    }

    // ─── Header ────────────────────────────────────────────────
    function Header({ screen, onBack, onAdmin }) {
      return (
        <div style={{ background: BRAND.navy, padding: "16px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 50 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            {screen !== SCREENS.SELECT && (
              <button onClick={onBack} style={{ background: "none", border: "none", color: BRAND.cream, fontSize: 20, cursor: "pointer", padding: "4px 8px" }}>←</button>
            )}
            <div>
              <div style={{ color: BRAND.orange, fontWeight: 700, fontSize: 16, letterSpacing: 1 }}>MENTES ABUNDANTES</div>
              <div style={{ color: BRAND.cream, fontSize: 11, opacity: 0.8, marginTop: 2 }}>Módulo 6 — Tu Historia como Herramienta de Marca</div>
            </div>
          </div>
          {screen === SCREENS.SELECT && (
            <button onClick={onAdmin} style={{ background: BRAND.orange, border: "none", color: BRAND.white, fontSize: 11, padding: "6px 12px", borderRadius: 6, cursor: "pointer", fontWeight: 600 }}>
              📊 Ver Respuestas
            </button>
          )}
        </div>
      );
    }

    // ─── Select Screen ──────────────────────────────────────────
    function SelectScreen({ onSelect, completedIds }) {
      return (
        <div style={{ maxWidth: 600, margin: "0 auto", padding: "24px 16px" }}>
          <div style={{ textAlign: "center", marginBottom: 28 }}>
            <div style={{ fontSize: 36, marginBottom: 10 }}>✍️</div>
            <h1 style={{ fontSize: 22, color: BRAND.navy, fontWeight: 700, margin: "0 0 8px" }}>Tarea Módulo 6</h1>
            <p style={{ fontSize: 14, color: BRAND.mutedText, margin: "0 0 4px" }}>Tu Historia como Herramienta de Marca</p>
            <p style={{ fontSize: 13, color: BRAND.mutedText, margin: 0 }}>Selecciona tu nombre para comenzar</p>
          </div>

          <div style={{ background: BRAND.cream, borderRadius: 14, padding: "16px 20px", marginBottom: 24, border: `1px solid ${BRAND.orange}30` }}>
            <p style={{ fontSize: 13, color: BRAND.navy, fontWeight: 600, margin: "0 0 10px" }}>Esta semana trabajarás tres historias:</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {HISTORIAS.map(h => (
                <div key={h.id} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 18 }}>{h.emoji}</span>
                  <div>
                    <span style={{ fontSize: 13, fontWeight: 700, color: BRAND.navy }}>{h.titulo}</span>
                    <span style={{ fontSize: 12, color: BRAND.mutedText }}> — {h.subtitulo}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div style={{ display: "grid", gap: 10 }}>
            {MEMBERS.map(m => {
              const done = completedIds.has(m.id);
              return (
                <button key={m.id} onClick={() => onSelect(m)}
                  style={{
                    width: "100%", textAlign: "left", background: BRAND.white,
                    border: `1px solid ${done ? BRAND.olive : "#E5E7EB"}`,
                    borderRadius: 12, padding: "14px 18px", cursor: "pointer",
                    boxShadow: "0 1px 3px rgba(0,0,0,0.05)", position: "relative",
                  }}
                >
                  {done && (
                    <div style={{ position: "absolute", top: 10, right: 12, background: BRAND.olive, color: BRAND.white, fontSize: 10, padding: "3px 8px", borderRadius: 10, fontWeight: 600 }}>
                      ✓ Completada
                    </div>
                  )}
                  <div style={{ fontWeight: 700, fontSize: 15, color: BRAND.navy, marginBottom: 3 }}>{m.name}</div>
                  <div style={{ fontSize: 12, color: BRAND.mutedText }}>{m.business}</div>
                </button>
              );
            })}
          </div>

          <div style={{ textAlign: "center", marginTop: 20, padding: "14px", background: `${BRAND.orange}10`, borderRadius: 12, border: `1px solid ${BRAND.orange}30` }}>
            <p style={{ fontSize: 13, color: BRAND.orange, fontWeight: 600, margin: "0 0 4px" }}>📅 Fecha límite: Jueves antes de la próxima sesión</p>
            <p style={{ fontSize: 12, color: BRAND.mutedText, margin: 0 }}>Tus respuestas se guardan automáticamente</p>
          </div>
        </div>
      );
    }

    // ─── Historia Block ─────────────────────────────────────────
    function HistoriaBlock({ historia, responses, onUpdate }) {
      const inputStyle = {
        width: "100%", border: "1px solid #E5E7EB", borderRadius: 10, padding: "12px 14px",
        fontSize: 14, fontFamily: "inherit", resize: "vertical", minHeight: 85,
        outline: "none", boxSizing: "border-box", lineHeight: 1.6, background: BRAND.white,
      };

      return (
        <div style={{ marginBottom: 24, background: BRAND.white, borderRadius: 14, overflow: "hidden", boxShadow: "0 1px 4px rgba(0,0,0,0.06)", border: "1px solid #F0F0F0" }}>
          <div style={{ background: historia.color, padding: "18px 20px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
              <span style={{ fontSize: 22 }}>{historia.emoji}</span>
              <div>
                <div style={{ color: BRAND.white, fontWeight: 700, fontSize: 16 }}>{historia.titulo}</div>
                <div style={{ color: "rgba(255,255,255,0.8)", fontSize: 12 }}>{historia.subtitulo}</div>
              </div>
            </div>
            <p style={{ color: "rgba(255,255,255,0.9)", fontSize: 13, margin: 0, lineHeight: 1.5 }}>{historia.descripcion}</p>
          </div>

          <div style={{ padding: "20px" }}>
            {historia.preguntas.map((q, i) => (
              <div key={i} style={{ marginBottom: 18 }}>
                <div style={{ display: "flex", gap: 10, marginBottom: 8 }}>
                  <span style={{
                    background: historia.color, color: BRAND.white,
                    width: 22, height: 22, borderRadius: "50%",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 11, fontWeight: 700, flexShrink: 0, marginTop: 2,
                  }}>{i + 1}</span>
                  <p style={{ fontSize: 14, color: BRAND.navy, fontWeight: 600, margin: 0, lineHeight: 1.5 }}>{q}</p>
                </div>
                <textarea
                  style={inputStyle}
                  value={responses[`${historia.id}_q${i}`] || ""}
                  onChange={e => onUpdate(`${historia.id}_q${i}`, e.target.value)}
                  placeholder="Escribe tu respuesta aquí..."
                />
              </div>
            ))}

            <div style={{ background: `${historia.color}15`, border: `1px solid ${historia.color}35`, borderRadius: 10, padding: "14px 16px", marginTop: 4 }}>
              <p style={{ fontSize: 13, color: historia.color, fontWeight: 700, margin: "0 0 10px" }}>
                ✨ En una oración: ¿cuál es el mensaje central de tu {historia.titulo.toLowerCase()}?
              </p>
              <textarea
                style={{ ...inputStyle, minHeight: 60 }}
                value={responses[`${historia.id}_reflexion`] || ""}
                onChange={e => onUpdate(`${historia.id}_reflexion`, e.target.value)}
                placeholder="Resume tu historia en una sola oración poderosa..."
              />
            </div>
          </div>
        </div>
      );
    }

    // ─── Homework Screen ────────────────────────────────────────
    function HomeworkScreen({ member }) {
      const [responses, setResponses] = useState(emptyResponses());
      const [saving, setSaving] = useState(false);
      const [saved, setSaved] = useState(false);
      const [loaded, setLoaded] = useState(false);

      useEffect(() => {
        loadResponses(member.id).then(data => {
          if (data) setResponses(data);
          setLoaded(true);
        });
      }, [member.id]);

      const update = (key, val) => {
        setResponses(prev => ({ ...prev, [key]: val }));
        setSaved(false);
      };

      const handleSave = async () => {
        setSaving(true);
        await saveResponses(member.id, responses);
        setSaving(false);
        setSaved(true);
        setTimeout(() => setSaved(false), 3000);
      };

      if (!loaded) return <div style={{ textAlign: "center", padding: 40, color: BRAND.mutedText }}>Cargando...</div>;

      return (
        <div style={{ maxWidth: 640, margin: "0 auto", padding: "20px 16px 100px" }}>
          <div style={{ background: BRAND.navy, borderRadius: 16, padding: "22px 20px", marginBottom: 20, position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", top: -20, right: -20, width: 100, height: 100, borderRadius: "50%", background: BRAND.orange, opacity: 0.1 }} />
            <div style={{ fontSize: 12, color: BRAND.orange, fontWeight: 600, letterSpacing: 1, marginBottom: 6 }}>MÓDULO 6 — TAREA</div>
            <div style={{ fontSize: 22, color: BRAND.white, fontWeight: 700, marginBottom: 4 }}>{member.name}</div>
            <div style={{ fontSize: 13, color: BRAND.cream, opacity: 0.85 }}>{member.business}</div>
          </div>

          <div style={{ background: BRAND.cream, borderRadius: 12, padding: "16px 18px", marginBottom: 22, border: `1px solid ${BRAND.orange}25` }}>
            <p style={{ fontSize: 14, color: BRAND.navy, fontWeight: 600, margin: "0 0 6px" }}>Esta semana no hay clase en vivo.</p>
            <p style={{ fontSize: 13, color: BRAND.darkText, margin: 0, lineHeight: 1.6 }}>
              Krystina te dejó este ejercicio para que trabajes a tu ritmo. Responde las tres historias con honestidad — sin buscar la respuesta perfecta. Lo que importa es que sea tuyo.
            </p>
          </div>

          {HISTORIAS.map(h => (
            <HistoriaBlock key={h.id} historia={h} responses={responses} onUpdate={update} />
          ))}

          <div style={{ background: `${BRAND.olive}10`, border: `1px solid ${BRAND.olive}30`, borderRadius: 12, padding: "16px 18px", marginBottom: 20 }}>
            <p style={{ fontSize: 13, color: BRAND.olive, fontWeight: 700, margin: "0 0 6px" }}>🎯 Antes de guardar, pregúntate:</p>
            <p style={{ fontSize: 13, color: BRAND.darkText, margin: 0, lineHeight: 1.6 }}>
              ¿Cuál de las tres historias te movió más al escribirla? Esa es la que publicas primero esta semana.
            </p>
          </div>

          <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "linear-gradient(transparent, white 30%)", padding: "20px 16px 16px", zIndex: 40 }}>
            <div style={{ maxWidth: 640, margin: "0 auto" }}>
              <button onClick={handleSave} disabled={saving} style={{
                width: "100%", padding: "16px", borderRadius: 14, border: "none", fontWeight: 700, fontSize: 16,
                cursor: saving ? "wait" : "pointer",
                background: saved ? BRAND.olive : BRAND.orange, color: BRAND.white,
                boxShadow: "0 4px 12px rgba(212,118,44,0.3)",
              }}>
                {saving ? "Guardando..." : saved ? "✓ ¡Guardado con éxito!" : "💾 Guardar Mis Historias"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Admin Screen ───────────────────────────────────────────
    function AdminScreen() {
      const [allData, setAllData] = useState({});
      const [loading, setLoading] = useState(true);
      const [expanded, setExpanded] = useState(null);
      const [copied, setCopied] = useState(false);
      const [showReset, setShowReset] = useState(false);

      useEffect(() => {
        loadAllResponses().then(data => { setAllData(data); setLoading(false); });
      }, []);

      const generateCSV = useCallback(() => {
        const headers = [
          "Nombre", "Negocio",
          "Origen — Antes", "Origen — El momento", "Origen — El giro", "Origen — En una oración",
          "Transformación — Qué creías", "Transformación — Qué soltaste", "Transformación — Cómo operas hoy", "Transformación — En una oración",
          "Cliente — Cómo llegó", "Cliente — Qué trabajaron", "Cliente — Cómo cambió", "Cliente — En una oración",
        ];
        const esc = v => '"' + (v || "").replace(/"/g, '""').replace(/\n/g, " ") + '"';
        const rows = MEMBERS.filter(m => allData[m.id]).map(m => {
          const d = allData[m.id];
          return [
            m.name, m.business,
            d.origen_q0, d.origen_q1, d.origen_q2, d.origen_reflexion,
            d.transformacion_q0, d.transformacion_q1, d.transformacion_q2, d.transformacion_reflexion,
            d.cliente_q0, d.cliente_q1, d.cliente_q2, d.cliente_reflexion,
          ].map(esc).join(",");
        });
        return headers.join(",") + "\n" + rows.join("\n");
      }, [allData]);

      const handleCopyCSV = () => {
        const csv = generateCSV();
        navigator.clipboard.writeText(csv).then(() => {
          setCopied(true); setTimeout(() => setCopied(false), 3000);
        }).catch(() => {
          const ta = document.createElement("textarea");
          ta.value = csv; document.body.appendChild(ta); ta.select();
          document.execCommand("copy"); document.body.removeChild(ta);
          setCopied(true); setTimeout(() => setCopied(false), 3000);
        });
      };

      const handleDownloadCSV = () => {
        const csv = "\uFEFF" + generateCSV();
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = "Respuestas_M6_TuHistoria.csv";
        a.click(); URL.revokeObjectURL(url);
      };

      const handleResetAll = async () => {
        for (const m of MEMBERS) {
          try { await window.storage.set(`m6:${m.id}`, ""); } catch {}
          try { await window.storage.delete(`m6:${m.id}`); } catch {}
        }
        setAllData({}); setShowReset(false);
      };

      if (loading) return <div style={{ textAlign: "center", padding: 40, color: BRAND.mutedText }}>Cargando respuestas...</div>;

      const completedCount = Object.keys(allData).length;

      return (
        <div style={{ maxWidth: 640, margin: "0 auto", padding: "20px 16px" }}>
          <div style={{ textAlign: "center", marginBottom: 20 }}>
            <h1 style={{ fontSize: 20, color: BRAND.navy, margin: "0 0 6px" }}>Panel de Respuestas — M6</h1>
            <p style={{ fontSize: 14, color: BRAND.mutedText, margin: 0 }}>{completedCount} de {MEMBERS.length} han respondido</p>
            <div style={{ marginTop: 12, height: 6, background: "#E5E7EB", borderRadius: 3, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${(completedCount / MEMBERS.length) * 100}%`, background: BRAND.olive, borderRadius: 3 }} />
            </div>
          </div>

          <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
            <button onClick={handleDownloadCSV} style={{ flex: 1, padding: "12px", borderRadius: 10, border: "none", background: BRAND.navy, color: BRAND.white, fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
              📥 Descargar CSV
            </button>
            <button onClick={handleCopyCSV} style={{ flex: 1, padding: "12px", borderRadius: 10, border: "none", background: copied ? BRAND.olive : BRAND.orange, color: BRAND.white, fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
              {copied ? "✓ ¡Copiado!" : "📋 Copiar para Sheets"}
            </button>
          </div>

          {MEMBERS.map(m => {
            const data = allData[m.id];
            const isExpanded = expanded === m.id;
            return (
              <div key={m.id} style={{ marginBottom: 10, borderRadius: 12, overflow: "hidden", border: `1px solid ${data ? BRAND.olive + "60" : "#E5E7EB"}` }}>
                <button onClick={() => setExpanded(isExpanded ? null : m.id)} style={{
                  width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center",
                  background: data ? `${BRAND.olive}10` : BRAND.white, border: "none", padding: "14px 18px", cursor: "pointer", textAlign: "left",
                }}>
                  <div>
                    <span style={{ fontWeight: 700, fontSize: 15, color: BRAND.navy }}>{m.name}</span>
                    <span style={{ fontSize: 12, color: BRAND.mutedText, marginLeft: 8 }}>{m.business}</span>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    {data
                      ? <span style={{ fontSize: 11, color: BRAND.olive, fontWeight: 600, background: `${BRAND.olive}20`, padding: "3px 8px", borderRadius: 6 }}>✓ Completada</span>
                      : <span style={{ fontSize: 11, color: BRAND.mutedText, background: "#F3F4F6", padding: "3px 8px", borderRadius: 6 }}>Pendiente</span>}
                    <span style={{ fontSize: 14, color: BRAND.mutedText }}>{isExpanded ? "▲" : "▼"}</span>
                  </div>
                </button>

                {isExpanded && data && (
                  <div style={{ padding: "16px 18px", background: BRAND.white, borderTop: "1px solid #F0F0F0" }}>
                    {HISTORIAS.map(h => (
                      <div key={h.id} style={{ marginBottom: 18 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 10 }}>
                          <span style={{ fontSize: 16 }}>{h.emoji}</span>
                          <span style={{ fontSize: 13, fontWeight: 700, color: h.color }}>{h.titulo}</span>
                        </div>
                        {h.preguntas.map((q, i) => (
                          <div key={i} style={{ marginBottom: 10 }}>
                            <div style={{ fontSize: 11, color: BRAND.mutedText, marginBottom: 3 }}>{q}</div>
                            <div style={{ fontSize: 13, color: BRAND.darkText, background: BRAND.lightBg, padding: "10px 12px", borderRadius: 8, lineHeight: 1.6 }}>
                              {data[`${h.id}_q${i}`] || <em style={{ color: "#CCC" }}>Sin respuesta</em>}
                            </div>
                          </div>
                        ))}
                        {data[`${h.id}_reflexion`] && (
                          <div style={{ background: `${h.color}10`, border: `1px solid ${h.color}30`, padding: "10px 12px", borderRadius: 8 }}>
                            <div style={{ fontSize: 11, fontWeight: 700, color: h.color, marginBottom: 4 }}>✨ En una oración</div>
                            <div style={{ fontSize: 13, color: BRAND.darkText, lineHeight: 1.6 }}>{data[`${h.id}_reflexion`]}</div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}

                {isExpanded && !data && (
                  <div style={{ padding: "20px", background: BRAND.white, textAlign: "center", borderTop: "1px solid #F0F0F0" }}>
                    <p style={{ fontSize: 14, color: BRAND.mutedText, margin: 0 }}>Aún no ha enviado respuestas</p>
                  </div>
                )}
              </div>
            );
          })}

          <div style={{ marginTop: 24, textAlign: "center" }}>
            {!showReset ? (
              <button onClick={() => setShowReset(true)} style={{ padding: "10px 20px", borderRadius: 8, border: "1px solid #E5E7EB", background: BRAND.white, color: "#EF4444", fontSize: 12, cursor: "pointer" }}>
                🗑 Limpiar todas las respuestas
              </button>
            ) : (
              <div style={{ background: "#FEF2F2", border: "1px solid #FECACA", borderRadius: 10, padding: 16 }}>
                <p style={{ fontSize: 13, color: "#DC2626", fontWeight: 600, margin: "0 0 12px" }}>¿Estás segura? Esto borrará TODAS las respuestas del M6.</p>
                <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
                  <button onClick={handleResetAll} style={{ padding: "10px 24px", borderRadius: 8, border: "none", background: "#DC2626", color: BRAND.white, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
                    Sí, borrar todo
                  </button>
                  <button onClick={() => setShowReset(false)} style={{ padding: "10px 24px", borderRadius: 8, border: "1px solid #E5E7EB", background: BRAND.white, color: BRAND.mutedText, fontSize: 13, cursor: "pointer" }}>
                    Cancelar
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── Main App ───────────────────────────────────────────────
    function App() {
      const [screen, setScreen] = useState(SCREENS.SELECT);
      const [selectedMember, setSelectedMember] = useState(null);
      const [completedIds, setCompletedIds] = useState(new Set());

      useEffect(() => {
        loadAllResponses().then(data => setCompletedIds(new Set(Object.keys(data))));
      }, []);

      const handleSelect = member => { setSelectedMember(member); setScreen(SCREENS.HOMEWORK); };

      const handleBack = () => {
        setScreen(SCREENS.SELECT);
        setSelectedMember(null);
        loadAllResponses().then(data => setCompletedIds(new Set(Object.keys(data))));
      };

      return (
        <div style={{ minHeight: "100vh", background: BRAND.lightBg }}>
          <Header screen={screen} onBack={handleBack} onAdmin={() => setScreen(SCREENS.ADMIN)} />
          {screen === SCREENS.SELECT && <SelectScreen onSelect={handleSelect} completedIds={completedIds} />}
          {screen === SCREENS.HOMEWORK && selectedMember && <HomeworkScreen member={selectedMember} />}
          {screen === SCREENS.ADMIN && <AdminScreen />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
